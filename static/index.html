<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clawbot — AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0f;
      color: #e8e8ea;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e24;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 0.75rem;
      color: #666;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #3ecfcf;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #3ecfcf;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #6c63ff, #5548e0);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #18181f;
      border: 1px solid #26262e;
      color: #e8e8ea;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 0.68rem;
      color: #444;
      margin-top: 4px;
      padding: 0 4px;
    }

    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-7px); background: #6c63ff; }
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px 20px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #18181f;
      border: 1px solid #2a2a34;
      border-radius: 14px;
      padding: 12px 16px;
      color: #e8e8ea;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #6c63ff; }
    #user-input::placeholder { color: #444; }

    #send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; fill: white; }

    .welcome {
      text-align: center;
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0.5;
    }

    .welcome .icon { font-size: 3rem; }
    .welcome h2 { font-size: 1.2rem; font-weight: 600; }
    .welcome p { font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>Clawbot</h1>
      <p>Powered by GPT-4o · Monitored by AgentOps</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="chat-window">
    <div class="welcome" id="welcome-msg">
      <div class="icon">🦾</div>
      <h2>Clawbot is ready</h2>
      <p>Ask me anything — I'm here to help.</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Message Clawbot..."></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const userInput  = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const welcomeMsg = document.getElementById('welcome-msg');

    let history = [];

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(role, text) {
      if (welcomeMsg) welcomeMsg.remove();

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const ts = document.createElement('div');
      ts.className = 'timestamp';
      ts.textContent = getTime();

      wrapper.appendChild(bubble);
      wrapper.appendChild(ts);
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return wrapper;
    }

    function showTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message bot typing-indicator';
      wrapper.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return wrapper;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      history.push({ role: 'user', content: text });
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;

      const typingEl = showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Server error');
        }

        const data = await res.json();
        typingEl.remove();
        appendMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });

      } catch (err) {
        typingEl.remove();
        appendMessage('bot', `⚠️ Error: ${err.message}`);
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });
  </script>
</body>
</html>
